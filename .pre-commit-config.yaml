# ═══════════════════════════════════════════════════════════════════
# Data Agents — Pre-commit Hooks
# Gate de qualidade local: roda antes de todo `git commit`
#
# Instalação:
#   pip install pre-commit
#   pre-commit install
#
# Execução manual em todos os arquivos:
#   pre-commit run --all-files
# ═══════════════════════════════════════════════════════════════════

repos:
  # ─── Ruff: linting + formatação (substitui flake8, black, isort) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: ["--fix", "--output-format=full"]
      - id: ruff-format

  # ─── Checagens básicas de arquivos ───────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1500"]
        exclude: ^img/readme/
      - id: detect-private-key

  # ─── Segurança: bandit ────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        args: ["-ll", "--skip", "B101,B108"]
        types: [python]
