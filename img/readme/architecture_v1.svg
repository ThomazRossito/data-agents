<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B949E"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="38" font-size="16" font-weight="700" fill="#F0F6FC" text-anchor="middle" letter-spacing="1">COMO O DATA AGENTS FUNCIONA</text>
  <line x1="60" y1="52" x2="1140" y2="52" stroke="#30363D" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════
       CAMADA 1 — ENTRADA DO USUÁRIO
  ═══════════════════════════════════════════════ -->
  <text x="60" y="78" font-size="11" fill="#8B949E" font-weight="600" letter-spacing="1">CAMADA 1 — COMO VOCÊ INTERAGE</text>

  <rect x="60" y="88" width="190" height="58" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="155" y="114" font-size="13" font-weight="600" fill="#F0F6FC" text-anchor="middle">Terminal (CLI)</text>
  <text x="155" y="134" font-size="11" fill="#8B949E" text-anchor="middle">python main.py</text>

  <rect x="268" y="88" width="190" height="58" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="363" y="114" font-size="13" font-weight="600" fill="#F0F6FC" text-anchor="middle">Web Chat</text>
  <text x="363" y="134" font-size="11" fill="#8B949E" text-anchor="middle">Chainlit</text>

  <rect x="476" y="88" width="664" height="58" rx="8" fill="#1A1A2E" stroke="#6E40C9" stroke-width="1.5"/>
  <text x="808" y="110" font-size="13" font-weight="600" fill="#C4B5FD" text-anchor="middle">Comandos Slash</text>
  <text x="808" y="132" font-size="10.5" fill="#8B949E" text-anchor="middle">/sql · /spark · /pipeline · /python · /migrate · /quality · /governance · /semantic · /plan · /party · /mcp · /eval · /geral · …</text>

  <!-- Arrows layer 1 → 2 -->
  <line x1="155" y1="146" x2="155" y2="196" stroke="#8B949E" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="363" y1="146" x2="363" y2="196" stroke="#8B949E" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="808" y1="146" x2="808" y2="196" stroke="#6E40C9" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════
       CAMADA 2 — SUPERVISOR
  ═══════════════════════════════════════════════ -->
  <text x="60" y="198" font-size="11" fill="#8B949E" font-weight="600" letter-spacing="1">CAMADA 2 — QUEM COORDENA</text>

  <rect x="60" y="208" width="1080" height="80" rx="10" fill="#162032" stroke="#2563EB" stroke-width="2"/>
  <text x="600" y="241" font-size="15" font-weight="700" fill="#60A5FA" text-anchor="middle">Supervisor  —  Orquestrador Central</text>
  <text x="600" y="263" font-size="12" fill="#93C5FD" text-anchor="middle">Entende o que você quer · Planeja a solução · Decide quem vai executar · Valida o resultado</text>
  <text x="600" y="281" font-size="11" fill="#4B6B99" text-anchor="middle">Nunca executa código diretamente — sempre delega para os especialistas abaixo</text>

  <!-- Arrow layer 2 → 3 -->
  <line x1="600" y1="288" x2="600" y2="328" stroke="#2563EB" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- ═══════════════════════════════════════════════
       CAMADA 3 — ESPECIALISTAS
  ═══════════════════════════════════════════════ -->
  <text x="60" y="332" font-size="11" fill="#8B949E" font-weight="600" letter-spacing="1">CAMADA 3 — QUEM FAZ O TRABALHO  (13 Agentes Especialistas)</text>

  <!-- ── T1: Engenharia Core (x=60, w=450, h=130) ── -->
  <rect x="60" y="344" width="450" height="130" rx="10" fill="#0F1A0F" stroke="#238636" stroke-width="1.5"/>
  <text x="285" y="366" font-size="12" font-weight="700" fill="#3FB950" text-anchor="middle">⚙ Engenharia Core  [T1]</text>

  <rect x="78" y="374" width="134" height="40" rx="6" fill="#161B22" stroke="#238636" stroke-width="1"/>
  <text x="145" y="391" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">SQL Expert</text>
  <text x="145" y="406" font-size="10" fill="#8B949E" text-anchor="middle">SQL · Schemas · KQL</text>

  <rect x="218" y="374" width="134" height="40" rx="6" fill="#161B22" stroke="#238636" stroke-width="1"/>
  <text x="285" y="391" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">Spark Expert</text>
  <text x="285" y="406" font-size="10" fill="#8B949E" text-anchor="middle">PySpark · Delta Lake</text>

  <rect x="358" y="374" width="134" height="40" rx="6" fill="#161B22" stroke="#238636" stroke-width="1"/>
  <text x="425" y="391" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">Pipeline Architect</text>
  <text x="425" y="406" font-size="10" fill="#8B949E" text-anchor="middle">ETL/ELT · DataOps</text>

  <rect x="78" y="422" width="203" height="38" rx="6" fill="#162A0A" stroke="#4ADE80" stroke-width="1.2"/>
  <text x="179" y="438" font-size="11" font-weight="600" fill="#86EFAC" text-anchor="middle">Python Expert</text>
  <text x="179" y="453" font-size="10" fill="#8B949E" text-anchor="middle">Python · APIs · pytest · pandas</text>

  <rect x="289" y="422" width="203" height="38" rx="6" fill="#162A0A" stroke="#4ADE80" stroke-width="1.2"/>
  <text x="390" y="438" font-size="11" font-weight="600" fill="#86EFAC" text-anchor="middle">Migration Expert</text>
  <text x="390" y="453" font-size="10" fill="#8B949E" text-anchor="middle">SQL Server/PG → Databricks/Fabric</text>

  <!-- ── T2: Especialistas (x=524, w=380, h=176 — inclui Business Monitor) ── -->
  <rect x="524" y="344" width="380" height="176" rx="10" fill="#1A0F1A" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="714" y="366" font-size="12" font-weight="700" fill="#A78BFA" text-anchor="middle">🛡 Especialistas  [T2]</text>

  <rect x="542" y="374" width="168" height="40" rx="6" fill="#161B22" stroke="#8B5CF6" stroke-width="1"/>
  <text x="626" y="391" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">Data Quality</text>
  <text x="626" y="406" font-size="10" fill="#8B949E" text-anchor="middle">Validação · SLA · Profiling</text>

  <rect x="718" y="374" width="168" height="40" rx="6" fill="#161B22" stroke="#8B5CF6" stroke-width="1"/>
  <text x="802" y="391" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">Governance Auditor</text>
  <text x="802" y="406" font-size="10" fill="#8B949E" text-anchor="middle">LGPD · Linhagem · PII</text>

  <rect x="542" y="422" width="168" height="38" rx="6" fill="#161B22" stroke="#8B5CF6" stroke-width="1"/>
  <text x="626" y="438" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">dbt Expert</text>
  <text x="626" y="453" font-size="10" fill="#8B949E" text-anchor="middle">dbt Core · Tests · Docs</text>

  <rect x="718" y="422" width="168" height="38" rx="6" fill="#161B22" stroke="#8B5CF6" stroke-width="1"/>
  <text x="802" y="438" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">Semantic Modeler</text>
  <text x="802" y="453" font-size="10" fill="#8B949E" text-anchor="middle">DAX · Direct Lake · Genie BI</text>

  <!-- Business Monitor: row 3, full width inside T2 -->
  <rect x="542" y="468" width="344" height="38" rx="6" fill="#1E1530" stroke="#C084FC" stroke-width="1.5"/>
  <text x="714" y="484" font-size="11" font-weight="600" fill="#E9D5FF" text-anchor="middle">Business Monitor</text>
  <text x="714" y="499" font-size="10" fill="#8B949E" text-anchor="middle">Alertas · Daemon · Q&amp;A Interativo sobre dados</text>

  <!-- ── T3: Conversacional (x=918, w=222, h=130) ── -->
  <rect x="918" y="344" width="222" height="130" rx="10" fill="#1A1510" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="1029" y="366" font-size="12" font-weight="700" fill="#FCD34D" text-anchor="middle">💼 Conversacional  [T3]</text>

  <rect x="936" y="374" width="186" height="40" rx="6" fill="#161B22" stroke="#F59E0B" stroke-width="1"/>
  <text x="1029" y="391" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">Business Analyst</text>
  <text x="1029" y="406" font-size="10" fill="#8B949E" text-anchor="middle">Briefings → Backlog P0/P1/P2</text>

  <rect x="936" y="422" width="186" height="38" rx="6" fill="#161B22" stroke="#F59E0B" stroke-width="1"/>
  <text x="1029" y="438" font-size="11" font-weight="600" fill="#F0F6FC" text-anchor="middle">Geral  (/geral)</text>
  <text x="1029" y="453" font-size="10" fill="#8B949E" text-anchor="middle">Respostas rápidas · 95% mais barato</text>

  <!-- ── Party Mode strip (y=534) ── -->
  <rect x="60" y="534" width="1080" height="38" rx="8" fill="#1A1A0A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="600" y="549" font-size="12" font-weight="700" fill="#FCD34D" text-anchor="middle">🎉 Party Mode  (/party)  —  2 a 8 agentes respondendo em paralelo com perspectivas independentes</text>
  <text x="600" y="565" font-size="10.5" fill="#8B949E" text-anchor="middle">--default · --quality · --arch · --engineering · --migration · --full  |  ou nomeie agentes: /party sql-expert python-expert &lt;query&gt;</text>

  <!-- ═══════════════════════════════════════════════
       CAMADA 4 — PLATAFORMAS DE DADOS (via MCP)
  ═══════════════════════════════════════════════ -->
  <text x="60" y="592" font-size="11" fill="#8B949E" font-weight="600" letter-spacing="1">CAMADA 4 — ONDE OS DADOS ESTÃO  (via MCP)</text>

  <rect x="60" y="602" width="530" height="58" rx="10" fill="#1A0D0D" stroke="#FF3621" stroke-width="2"/>
  <text x="325" y="627" font-size="14" font-weight="700" fill="#FF3621" text-anchor="middle">Databricks</text>
  <text x="325" y="648" font-size="11" fill="#8B949E" text-anchor="middle">Unity Catalog · SQL · Spark · Genie · Model Serving · Workflows</text>

  <rect x="610" y="602" width="530" height="58" rx="10" fill="#0D1520" stroke="#0078D4" stroke-width="2"/>
  <text x="875" y="627" font-size="14" font-weight="700" fill="#0078D4" text-anchor="middle">Microsoft Fabric</text>
  <text x="875" y="648" font-size="11" fill="#8B949E" text-anchor="middle">Lakehouse · SQL Analytics · RTI (KQL) · Semantic Models · Power BI</text>

  <!-- ═══════════════════════════════════════════════
       CAMADA 5 — MEMÓRIA PERSISTENTE
  ═══════════════════════════════════════════════ -->
  <text x="60" y="676" font-size="11" fill="#8B949E" font-weight="600" letter-spacing="1">CAMADA 5 — MEMÓRIA PERSISTENTE  (dois layers)</text>

  <rect x="60" y="686" width="530" height="54" rx="10" fill="#0D1117" stroke="#374151" stroke-width="1.5"/>
  <text x="325" y="709" font-size="13" font-weight="600" fill="#9CA3AF" text-anchor="middle">Memória Episódica  (memory/)</text>
  <text x="325" y="728" font-size="10.5" fill="#6B7280" text-anchor="middle">Captura automática · Decay temporal · Retrieval semântico por sessão</text>

  <rect x="610" y="686" width="530" height="54" rx="10" fill="#0D1117" stroke="#374151" stroke-width="1.5"/>
  <text x="875" y="709" font-size="13" font-weight="600" fill="#9CA3AF" text-anchor="middle">Knowledge Graph  (memory_mcp/)</text>
  <text x="875" y="728" font-size="10.5" fill="#6B7280" text-anchor="middle">Entidades nomeadas · Relações · Persistência permanente (não decai)</text>
</svg>
