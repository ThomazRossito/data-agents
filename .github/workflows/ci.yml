name: CI — Lint, Type-check & Tests

on:
  workflow_dispatch:
  push:
    branches: ["main", "develop"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "agents/registry/**.md"
      - "agents/prompts/**"
      - "agents/cache_prefix.md"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "agents/registry/**.md"
      - "agents/prompts/**"
      - "agents/cache_prefix.md"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy agents/ config/ hooks/ commands/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      # Cache testmon: usado apenas em push (main/develop). Chave por branch+sha,
      # fallback progressivo. Em PRs não há cache — roda suite completa garantindo
      # que --cov-fail-under=80 seja calculado sobre 100% dos testes.
      - name: Restore testmon cache
        if: github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: .testmondata
          key: testmon-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            testmon-${{ runner.os }}-${{ github.ref }}-
            testmon-${{ runner.os }}-refs/heads/main-

      # Push para main/develop: testmon (só testes afetados), sem threshold.
      - name: Run tests — affected only (push)
        if: github.event_name == 'push'
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          DATABRICKS_HOST: "https://test.azuredatabricks.net"
          DATABRICKS_TOKEN: "test-token"
        run: |
          pytest tests/ --testmon -v --tb=short \
            --cov=agents --cov=config --cov=hooks --cov=commands \
            --cov-report=xml

      # PR para main: suite completa + threshold. Testmon não é usado aqui para
      # garantir que --cov-fail-under=80 seja calculado sobre todos os testes.
      - name: Run tests — full suite (pull request)
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          DATABRICKS_HOST: "https://test.azuredatabricks.net"
          DATABRICKS_TOKEN: "test-token"
        run: |
          pytest tests/ -v --tb=short \
            --cov=agents --cov=config --cov=hooks --cov=commands \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Security scan
        run: bandit -r agents/ config/ hooks/ commands/ -ll --skip B101 -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
