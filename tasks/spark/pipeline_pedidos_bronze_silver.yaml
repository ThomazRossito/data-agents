agent: spark_expert

task: |
  Crie um pipeline PySpark incremental Bronze → Silver para a tabela de pedidos.

  Especificações:
  - Fonte: JSON files em ADLS Gen2 (abfss://bronze@storage.dfs.core.windows.net/pedidos/)
